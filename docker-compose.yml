version: '3.8'

services:
  # Custom News API
  api:
    build: ./api
    container_name: ecodashboard-api
    ports:
      - "3002:3001"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - ecodash-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend
  frontend:
    build: .
    container_name: ecodashboard-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - ecodash-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ecodash-network:
    driver: bridge
